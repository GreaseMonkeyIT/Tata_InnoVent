# L4 API gateway (P6) — frontend-agnostic REST over L2/L3. Deployed to ns aiops.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aiops
  labels: { app: api, tier: aiops }
spec:
  replicas: 1
  selector: { matchLabels: { app: api } }
  template:
    metadata:
      labels: { app: api, tier: aiops }
    spec:
      serviceAccountName: api   # SA kept for future bounded RBAC; factory scenario Roles retired with the pivot (LOG-029)
      containers:
        - name: api
          image: skn/api:v0.1
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8088 }]
          env:
            - { name: ENGINE_URL,     value: "http://correlation-engine.aiops.svc:9100" }
            - { name: AGGREGATOR_URL, value: "http://aggregator.aiops.svc:9000" }
            - { name: COOLING_URL,    value: "http://cooling-monitor.factory-data.svc:8080" }
            - { name: PLANT_URL,      value: "http://plant-sim.plant.svc:9200" }   # plane-2 sim -> /api/plant
            - { name: OLLAMA_MODEL,   value: "gemma4:e4b-it-qat" }   # QAT 6.1GB (was e4b=11GB MXFP8 -> swapped the box); e2b-it-qat=4.3GB fits the 4GB GPU best
            # Ollama runs on the host (node IP; must listen on 0.0.0.0). Baked here so `kubectl apply`
            # no longer wipes it. Change to your node IP if it differs; empty -> template fallback.
            - { name: OLLAMA_HOST,    value: "http://192.168.1.239:11434" }
            - { name: TZ,             value: "Asia/Kolkata" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8088 }
            initialDelaySeconds: 3
          resources:
            requests: { cpu: 50m,  memory: 96Mi }
            limits:   { cpu: 250m, memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aiops
  labels: { app: api }
spec:
  type: NodePort
  selector: { app: api }
  ports: [{ name: http, port: 8088, targetPort: 8088, nodePort: 30088 }]
---
# The api SA (kept: harmless, and the future PS-series/act-loop RBAC will bind to it).
# PIVOT (LOG-029): the factory scenario Roles/RoleBindings (S2 Job in factory-data, S5 leak
# patch in factory-edge) are RETIRED — their namespaces are gone; applying them aborted skctl.
# The frozen Codex repo keeps them for the rollback path. PS-series faults are HTTP to
# plant-sim:9200 — no RBAC needed.
apiVersion: v1
kind: ServiceAccount
metadata: { name: api, namespace: aiops }
