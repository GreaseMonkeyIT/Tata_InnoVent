<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SiliconKnights — Soak Report</title>
<style>
  /* Grafana-like dark theme, lifted from the dashboard (dashboard/app/globals.css), simplified. */
  :root{
    --bg:#111217; --panel:#181b1f; --border:rgba(204,204,220,.12);
    --text:#ccccdc; --text-weak:rgba(204,204,220,.65); --text-faint:rgba(204,204,220,.4);
    --blue:#6e9fff; --green:#73bf69; --red:#f2495c; --orange:#ff9830; --purple:#b877d9;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Roboto,-apple-system,"Segoe UI",sans-serif;font-size:13px}
  .topbar{display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .topbar .title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .topbar .meta{display:flex;gap:16px;color:var(--text-weak);font-size:12px;flex-wrap:wrap}
  .wrap{max-width:1280px;margin:0 auto;padding:12px;display:grid;gap:10px;grid-template-columns:repeat(12,1fr)}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:3px;display:flex;flex-direction:column;min-height:0}
  .panel>.head{padding:8px 10px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .panel>.head .sub{font-weight:400;color:var(--text-weak);font-size:11px}
  .panel>.body{padding:10px;flex:1;min-height:0;overflow:auto}
  .stat{align-items:center;justify-content:center;text-align:center;padding:14px 8px}
  .stat .v{font-size:28px;font-weight:600;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stat .l{font-size:11px;color:var(--text-weak);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{color:var(--text-weak);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}
  .chip{padding:1px 7px;border-radius:10px;font-size:11px;border:1px solid}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .muted{color:var(--text-weak)} .faint{color:var(--text-faint)}
  .ev{padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:10px}
  .ev .ts{color:var(--text-faint);font-variant-numeric:tabular-nums}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-weak)}
  .note{font-size:11px;color:var(--text-faint);line-height:1.5;margin-top:8px}
  .ok{color:var(--green)} .warn{color:var(--orange)} .bad{color:var(--red)}
  svg{display:block;width:100%;height:auto}
  .c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c3{grid-column:span 3}
  @media(max-width:820px){.c8,.c6,.c4,.c3{grid-column:span 12}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="title">⚙ SiliconKnights · Soak / Stress Report</div>
    <div class="meta" id="topmeta"></div>
  </div>
  <div class="wrap" id="wrap"></div>

<script>
const SOAK = __SOAK_DATA__;

const PHASE_COLOR = {
  baseline:"rgba(204,204,220,.10)", cooldown:"rgba(115,191,105,.10)",
  S1:"rgba(110,159,255,.32)", S2:"rgba(255,152,48,.32)", S3:"rgba(184,119,217,.32)", S5:"rgba(242,73,92,.32)"
};
const SCEN_COLOR = {S1:"#6e9fff", S2:"#ff9830", S3:"#b877d9", S5:"#f2495c"};
const esc = s => String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const el = (h)=>{const d=document.createElement("div");d.innerHTML=h;return d.firstElementChild;};

function pct(x){ return (x*100).toFixed(0)+"%"; }
function panel(cls, head, sub, bodyHTML){
  return `<div class="panel ${cls}"><div class="head"><span>${head}</span>${sub?`<span class="sub">${sub}</span>`:""}</div><div class="body">${bodyHTML}</div></div>`;
}

// ---- top meta ----
const S = SOAK.summary;
document.getElementById("topmeta").innerHTML =
  `<span>run ${esc(S.run_id)}</span><span>${esc(S.started_iso)} → ${esc(S.ended_iso)} UTC</span><span>generated ${esc(S.generated_iso)}</span>`;

let html = "";

// ---- stat tiles ----
const tiles = [
  ["Duration", S.duration_min>=60 ? (S.duration_min/60).toFixed(1)+" h" : S.duration_min+" min"],
  ["Cycles", S.n_cycles],
  ["Samples", S.n_samples],
  ["Scenarios", esc(S.scenarios)],
];
html += tiles.map(t=>`<div class="panel c3 stat"><div class="v">${t[1]}</div><div class="l">${t[0]}</div></div>`).join("");

// ---- per-scenario summary ----
function verdictCell(s, d){
  if(s==="S5"){
    const ok = d.oom_cycle_rate>0;
    const eta = d.min_oom_eta_s!=null ? ` · best ETA ~${Math.round(d.min_oom_eta_s)}s` : "";
    return `<span class="${ok?'ok':'bad'}">${ok?'OOM forecast fired':'no forecast'} (${pct(d.oom_cycle_rate)} of cycles)${eta}</span>`;
  }
  if(s==="S3"){
    return `<span class="muted">detect ${pct(d.detect_rate)} · dominant ${esc(d.dominant_root)}</span>`;
  }
  const correct = d.correct_rate, cls = correct>=0.5?"ok":(correct>0?"warn":"bad");
  return `<span class="${cls}">root ${esc(d.dominant_root)} · correct ${pct(correct)}</span>`;
}
let rows = SOAK.scen_order.map(s=>{
  const d = SOAK.per_scenario[s] || {};
  const ttd = d.median_ttd_s!=null ? Math.round(d.median_ttd_s)+"s" : "—";
  return `<tr>
    <td><span class="dot" style="background:${SCEN_COLOR[s]}"></span><b>${s}</b></td>
    <td>${esc(d.expected)}</td>
    <td>${verdictCell(s,d)}</td>
    <td>${d.cycles||0}</td>
    <td>${ttd}</td>
    <td class="faint">${esc(d.note)}</td>
  </tr>`;
}).join("");
html += panel("c12", "Per-scenario outcome", "real faults, real verdicts — gaps shown as-is",
  `<table><thead><tr><th>Scenario</th><th>Expected root</th><th>Result</th><th>Cycles</th><th>Median time-to-detect</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table>
   <div class="note">"Correct" = share of in-fault samples whose top root equals the expected source. S1 should be high; S2 exposes the held-backbone mis-root; S3 stays honestly quiet (CPU physics); S5 has no causal root by design — its success is the OOM forecast firing before the kill.</div>`);

// ---- timeline (SVG) ----
const series = SOAK.series.filter(p=>p.epoch);
function timelineSVG(){
  if(series.length<2) return `<div class="muted">not enough samples to chart</div>`;
  const W=1240, H=200, padL=8, padR=8, top=8, ribbonH=22, chartTop=44, chartH=H-chartTop-22;
  const t0=series[0].epoch, t1=series[series.length-1].epoch, span=Math.max(1,t1-t0);
  const X = e => padL + (e-t0)/span*(W-padL-padR);
  const maxE = Math.max(1, ...series.map(p=>Math.max(p.n_edges, p.n_findings)));
  const Y = v => chartTop + chartH - (v/maxE)*chartH;
  let s="";
  // phase ribbon
  for(let i=0;i<series.length-1;i++){
    const p=series[i], x=X(p.epoch), w=Math.max(1,X(series[i+1].epoch)-x);
    s+=`<rect x="${x.toFixed(1)}" y="${top}" width="${w.toFixed(1)}" height="${ribbonH}" fill="${PHASE_COLOR[p.phase]||'transparent'}"/>`;
  }
  s+=`<text x="${padL}" y="${top+ribbonH-6}" font-size="10" fill="rgba(204,204,220,.55)">phase</text>`;
  // detection dots (on the ribbon baseline)
  series.forEach(p=>{
    if(p.root){
      const col = p.matched===true?"#73bf69":(p.matched===false?"#f2495c":"#6e9fff");
      s+=`<circle cx="${X(p.epoch).toFixed(1)}" cy="${(top+ribbonH+5).toFixed(1)}" r="2.4" fill="${col}"/>`;
    }
    if(p.oom!=null){
      s+=`<rect x="${(X(p.epoch)-1).toFixed(1)}" y="${chartTop}" width="2" height="${chartH}" fill="rgba(242,73,92,.5)"/>`;
    }
  });
  // gridline + axis labels
  s+=`<line x1="${padL}" y1="${Y(0)}" x2="${W-padR}" y2="${Y(0)}" stroke="rgba(204,204,220,.15)"/>`;
  s+=`<text x="${padL}" y="${Y(maxE)-3}" font-size="10" fill="rgba(204,204,220,.4)">${maxE}</text>`;
  // n_edges (blue) + n_findings (orange) polylines
  const poly = (key,col)=>{
    const pts=series.map(p=>`${X(p.epoch).toFixed(1)},${Y(p[key]).toFixed(1)}`).join(" ");
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.4"/>`;
  };
  s+=poly("n_edges","#6e9fff")+poly("n_findings","#ff9830");
  // time labels (start / mid / end)
  [t0,(t0+t1)/2,t1].forEach((e,i)=>{
    const d=new Date(e*1000), lbl=d.toISOString().substr(11,5);
    const anchor=i===0?"start":(i===2?"end":"middle");
    s+=`<text x="${X(e).toFixed(1)}" y="${H-6}" font-size="10" fill="rgba(204,204,220,.45)" text-anchor="${anchor}">${lbl}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${s}</svg>`;
}
const legend = `<div class="legend">
  ${SOAK.scen_order.map(s=>`<span><span class="dot" style="background:${SCEN_COLOR[s]}"></span>${s}</span>`).join("")}
  <span><span class="dot" style="background:#73bf69"></span>root = expected</span>
  <span><span class="dot" style="background:#f2495c"></span>root ≠ expected</span>
  <span style="color:#6e9fff">— accepted edges</span>
  <span style="color:#ff9830">— findings</span>
  <span style="color:#f2495c">| OOM forecast</span>
</div>`;
html += panel("c12", "Timeline", "phase ribbon · detections · edge & finding counts (UTC)",
  timelineSVG()+legend);

// ---- event log ----
const evs = (SOAK.events||[]).slice().reverse();
html += panel("c12", "Notable events", `${evs.length} shown (latest first)`,
  evs.length ? evs.map(e=>`<div class="ev"><span class="ts">${esc((e.t||"").substr(11,8))}</span><span class="${e.kind==='oom'?'bad':''}">${esc(e.text)}</span></div>`).join("")
             : `<div class="muted">no detections recorded</div>`);

document.getElementById("wrap").innerHTML = html;
</script>
</body>
</html>
